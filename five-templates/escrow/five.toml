schema_version = 1

# Escrow template with maker/taker flow

[project]
name = "five-escrow-template"
version = "1.0.0"
description = "Escrow template with maker/taker flow"
source_dir = "src"
build_dir = "build"
target = "vm"
entry_point = "src/main.v"

[optimizations]
enable_compression = true
enable_constraint_optimization = true
optimization_level = 2

[build]
max_bytecode_size = 2097152
target_compute_units = 500000
output_artifact_name = "five-escrow-template"

[deploy]
cluster = "devnet"
commitment = "confirmed"
rpc_url = "https://api.devnet.solana.com"

[doc]
generate_docs = true
docs_dir = "docs"
