# Token mint/transfer template

[project]
name = "five-token-template"
version = "1.0.0"
description = "Token mint/transfer template"
source_dir = "src"
build_dir = "build"
target = "vm"
entry_point = "src/token.v"

multi_file_mode = false

[optimizations]
enable_compression = true
enable_constraint_optimization = true
optimization_level = 2

[build]
max_bytecode_size = 2097152
target_compute_units = 500000
output_artifact_name = "five-token-template"

[deploy]
cluster = "localnet"
commitment = "confirmed"
rpc_url = "http://127.0.0.1:8899"

[doc]
generate_docs = true
docs_dir = "docs"
