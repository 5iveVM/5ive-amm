# Five Social Template
# A binary prediction/sentiment market template

[project]
name = "five-social-template"
version = "0.1.0"
description = "A binary prediction/sentiment market template"
source_dir = "src"
build_dir = "build"
target = "vm"
entry_point = "src/main.v"

[dependencies]
# Standard library is implicit

[build]
output_artifact_name = "five-social-template"


[optimizations]
enable_compression = true
enable_constraint_optimization = true
optimization_level = 2
