schema_version = 1

# Lending oracle helper template

[project]
name = "five-lending-oracle-helper"
version = "1.0.0"
description = "Minimal oracle helper for lending user-journey tests"
source_dir = "src"
build_dir = "build"
target = "vm"
entry_point = "src/main.v"

[optimizations]
enable_compression = true
enable_constraint_optimization = true
optimization_level = 2

[build]
max_bytecode_size = 262144
target_compute_units = 200000
output_artifact_name = "five-lending-oracle-helper"
