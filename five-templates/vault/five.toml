# Five Vault Template
# A native SOL vault example

[package]
name = "five-vault-template"
version = "0.1.0"
authors = ["Five Org"]
edition = "2024"

[build]
target = "vm"
entry_point = "./src/main.v"
source_dir = "./src"

# Multi-file compilation support
multi_file_mode = false

[optimizations]
enable_vle = true
enable_compression = true
enable_constraint_optimization = true
optimization_level = 2
