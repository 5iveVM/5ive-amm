# Five AMM Template
# A modular Automated Market Maker (DEX) template

[project]
name = "five-amm-template"
version = "0.1.0"
description = "A modular Automated Market Maker (DEX) template"
source_dir = "src"
build_dir = "build"
target = "vm"
entry_point = "src/main.v"

[build]
output_artifact_name = "five-amm-template"


[optimizations]
enable_compression = true
enable_constraint_optimization = true
optimization_level = 2
